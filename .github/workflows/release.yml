name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run check

      - name: Build plugin
        run: npm run build

      - name: Verify release version
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"

          if [ "$GITHUB_REF_NAME" != "$manifest_version" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match manifest version '$manifest_version'."
            exit 1
          fi

      - name: Verify release assets
        run: |
          test -s main.js
          test -s manifest.json
          test -s styles.css

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" main.js manifest.json styles.css --clobber
          else
            gh release create "$GITHUB_REF_NAME" main.js manifest.json styles.css \
              --title "$GITHUB_REF_NAME" \
              --notes "Release $GITHUB_REF_NAME"
          fi
